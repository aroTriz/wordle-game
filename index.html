<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<title>Wordle — Daily Word Game</title>
<style>
/* ═══════════════════════════════════════════════════
   WORDLE — Exact NYT Design Clone
   ═══════════════════════════════════════════════════ */

/* ─── CSS Reset ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}

/* ─── Design Tokens — Light Mode (default) ─── */
:root{
  --green:#27c93f;
  --yellow:#ffbd2e;
  --gray:#787c7e;
  --key-bg:#d3d6da;
  --key-text:#1a1a1a;
  --tone-1:#1a1a1a;
  --tone-2:#787c7e;
  --tone-4:#d3d6da;
  --tone-5:#878a8c;
  --tone-7:#f0f0f0;
  --orange:#ff5f56;
  --blue:#60a5fa;
  --bg:#ffffff;
  --header-border:#d3d6da;
  --header-height:65px;
  --keyboard-height:200px;
  --game-max-width:500px;
  --tile-gap:5px;
  --font-sans:'JetBrains Mono','Fira Code','Consolas',monospace;
  --font-karnak:'JetBrains Mono','Fira Code',monospace;
  color-scheme:light;
}

/* ─── Dark Mode Overrides ─── */
.dark{
  --green:#27c93f;
  --yellow:#ffbd2e;
  --gray:#3a3a3c;
  --key-bg:#2a2a2a;
  --key-text:#ffffff;
  --tone-1:#ffffff;
  --tone-2:#818384;
  --tone-4:#2a2a2a;
  --tone-5:#565758;
  --tone-7:#121213;
  --bg:#121213;
  --header-border:#3a3a3c;
  color-scheme:dark;
}

body{
  background:var(--bg);
  font-family:var(--font-sans);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  transition:background .2s;
}

/* ─── App Container ─── */
#app{
  width:100%;
  max-width:var(--game-max-width);
  height:100dvh;
  display:flex;
  flex-direction:column;
  margin:0 auto;
  position:relative;
  overflow:hidden;
}

/* ─── Header ─── */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  height:var(--header-height);
  border-bottom:1px solid var(--header-border);
  flex-shrink:0;
  transition:border-color .2s;
  position:relative;
}
header h1{
  font:700 36px var(--font-karnak);
  color:var(--tone-1);
  letter-spacing:.02em;
  text-transform:uppercase;
  transition:color .2s;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  white-space:nowrap;
}
.header-btn{
  background:none;
  border:none;
  cursor:pointer;
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  color:var(--tone-1);
  font-size:22px;
  transition:background .15s,color .2s;
}
.header-btn:hover{background:var(--tone-4)}
.header-btn svg{width:24px;height:24px;fill:currentColor}
.header-left,.header-right{display:flex;gap:4px}

/* ─── Board ─── */
#board-container{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px 0;
  overflow:hidden;
}
#board{
  display:grid;
  grid-template-rows:repeat(6,1fr);
  gap:var(--tile-gap);
  width:100%;
  max-width:350px;
  aspect-ratio:5/6.4;
  padding:0 8px;
}
.row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:var(--tile-gap);
}

/* ─── Tiles ─── */
.tile{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
  font-weight:700;
  line-height:1;
  text-transform:uppercase;
  color:var(--tone-1);
  background:var(--bg);
  border:2px solid var(--tone-4);
  aspect-ratio:1;
  transition:border-color .1s,background .1s,color .1s,transform .1s;
  user-select:none;
  -webkit-user-select:none;
  position:relative;
  /* Perspective for flip */
  perspective:600px;
}
.tile::before{
  content:'';
  display:block;
  padding-bottom:100%;
}
.tile-inner{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}

/* Tile states */
.tile.tbd{
  border-color:var(--tone-5);
  color:var(--tone-1);
}
.tile.correct{
  background:var(--green);
  border-color:var(--green);
  color:#fff;
}
.tile.present{
  background:var(--yellow);
  border-color:var(--yellow);
  color:#fff;
}
.tile.absent{
  background:var(--gray);
  border-color:var(--gray);
  color:#fff;
}
/* High contrast mode */
.high-contrast .tile.correct{background:var(--orange);border-color:var(--orange)}
.high-contrast .tile.present{background:var(--blue);border-color:var(--blue)}

/* ─── Tile Animations ─── */

/* Pop animation (on typing letter) */
@keyframes tile-pop{
  0%{transform:scale(.8);opacity:0}
  50%{transform:scale(1.1);opacity:1}
  100%{transform:scale(1);opacity:1}
}
.tile-pop{animation:tile-pop .1s ease-out}

/* Flip animation (on submit) */
@keyframes tile-flip{
  0%{transform:rotateX(0)}
  50%{transform:rotateX(-90deg)}
  100%{transform:rotateX(0)}
}
.tile-flip{
  animation:tile-flip .5s ease-in-out;
  /* Color changes at midpoint */
}
.tile-flip-start{
  transform:rotateX(0);
  z-index:2;
}
.tile-flip-end{
  animation:tile-flip .5s ease-in-out;
}

/* Row shake (invalid word) */
@keyframes row-shake{
  0%,100%{transform:translateX(0)}
  10%,50%,90%{transform:translateX(-5px)}
  30%,70%{transform:translateX(5px)}
}
.row-shake{animation:row-shake .6s ease-in-out}

/* Row bounce (win) */
@keyframes row-bounce{
  0%,100%{transform:translateY(0)}
  20%{transform:translateY(-20px)}
  40%{transform:translateY(4px)}
  60%{transform:translateY(-8px)}
  80%{transform:translateY(2px)}
}
.row-bounce .tile:nth-child(1){animation:row-bounce .8s ease .0s}
.row-bounce .tile:nth-child(2){animation:row-bounce .8s ease .05s}
.row-bounce .tile:nth-child(3){animation:row-bounce .8s ease .1s}
.row-bounce .tile:nth-child(4){animation:row-bounce .8s ease .15s}
.row-bounce .tile:nth-child(5){animation:row-bounce .8s ease .2s}

/* ─── Keyboard ─── */
#keyboard{
  padding:8px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  gap:6px;
  touch-action:manipulation;
}
.keyboard-row{
  display:flex;
  justify-content:center;
  gap:5px;
  width:100%;
}
.key{
  display:flex;
  align-items:center;
  justify-content:center;
  height:58px;
  min-width:0;
  padding:0 8px;
  border-radius:4px;
  background:var(--key-bg);
  color:var(--key-text);
  font-size:13px;
  font-weight:700;
  font-family:var(--font-sans);
  text-transform:uppercase;
  cursor:pointer;
  border:none;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
  transition:background .1s,color .1s,opacity .1s;
  flex:1;
  max-width:44px;
}
.key.wide{
  flex:1.5;
  max-width:65px;
  font-size:11px;
}
.key:active{opacity:.7}
.key.correct{background:var(--green);color:#fff;border-color:var(--green)}
.key.present{background:var(--yellow);color:#fff;border-color:var(--yellow)}
.key.absent{background:var(--gray);color:#fff;border-color:var(--gray)}
.high-contrast .key.correct{background:var(--orange)}
.high-contrast .key.present{background:var(--blue)}

/* ─── Toast ─── */
#toast-container{
  position:absolute;
  top:80px;
  left:0;
  right:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  pointer-events:none;
  z-index:100;
}
.toast{
  background:var(--tone-1);
  color:var(--tone-7);
  padding:12px 24px;
  border-radius:4px;
  font-size:14px;
  font-weight:700;
  font-family:var(--font-sans);
  opacity:0;
  transition:opacity .3s ease;
  pointer-events:none;
  text-align:center;
}
.toast.show{opacity:1}

/* ─── Modal ─── */
.definition-box{margin:16px 0;padding:14px;background:var(--tone-7);border:1px solid var(--tone-4);border-radius:8px;text-align:left;font-size:13px;line-height:1.5;color:var(--tone-2);max-height:120px;overflow-y:auto}
.definition-box.open{display:block}
.definition-box.hidden{display:none}
.definition-box .def-word{font-weight:700;color:var(--tone-1);font-size:15px;margin-bottom:4px}
.definition-box .def-phonetic{font-size:12px;color:var(--tone-5);margin-bottom:6px}
.definition-box .def-meaning{color:var(--tone-2)}
.definition-box .def-loading{color:var(--tone-5);font-style:italic}
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:200;
  padding:16px;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--bg);
  border-radius:8px;
  padding:32px;
  max-width:400px;
  width:100%;
  text-align:center;
  box-shadow:0 4px 24px rgba(0,0,0,.2);
  transition:background .2s;
}
.modal h2{
  font:700 28px var(--font-karnak);
  color:var(--tone-1);
  margin-bottom:24px;
  transition:color .2s;
}
.modal h3{
  font:400 16px var(--font-sans);
  color:var(--tone-2);
  margin-bottom:16px;
  transition:color .2s;
}
.stats-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:24px;
}
.stat{text-align:center}
.stat-num{
  font:700 36px var(--font-karnak);
  color:var(--tone-1);
  transition:color .2s;
}
.stat-label{
  font-size:12px;
  color:var(--tone-2);
  text-transform:uppercase;
  letter-spacing:.05em;
  transition:color .2s;
}
.dist-bar{
  display:flex;
  align-items:center;
  gap:4px;
  margin:2px 0;
}
.dist-label{
  width:20px;
  text-align:right;
  font-size:14px;
  font-weight:700;
  color:var(--tone-2);
  flex-shrink:0;
}
.dist-fill{
  height:20px;
  background:var(--gray);
  border-radius:2px;
  min-width:24px;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding-right:6px;
  font-size:12px;
  font-weight:700;
  color:#fff;
  transition:width .5s ease;
}
.dist-fill.highlight{background:var(--green)}
#next-word-timer{
  font-size:14px;
  color:var(--tone-2);
  margin-top:16px;
  margin-bottom:16px;
  transition:color .2s;
}
.btn-share{
  background:var(--green);
  color:#fff;
  border:none;
  padding:14px 48px;
  border-radius:24px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:opacity .15s;
}
.btn-share:hover{opacity:.8}
.btn-share:active{opacity:.6}

/* ─── Responsive ─── */
@media(max-width:415px){
  :root{--header-height:50px}
  header h1{font-size:28px}
  .tile{font-size:1.6rem}
  .key{height:50px;font-size:11px;max-width:38px}
  .key.wide{max-width:55px;font-size:10px}
  #board{max-width:320px}
  .modal{padding:24px}
}
@media(max-height:600px){
  :root{--keyboard-height:160px}
  .tile{font-size:1rem}
  #board{max-width:280px}
  .key{height:42px}
}
@media(min-width:768px){
  #board{max-width:350px}
}

/* ─── Settings Panel ─── */
.settings-group{margin-bottom:20px;text-align:left}
.settings-group h4{font-size:14px;font-weight:700;color:var(--tone-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.setting-row label{font-size:14px;color:var(--tone-1);cursor:pointer}
.toggle{position:relative;width:40px;height:24px;flex-shrink:0;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--tone-4);border-radius:12px;transition:background .2s}
.toggle-slider::before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s}
.toggle input:checked+.toggle-slider{background:var(--green)}
.toggle input:checked+.toggle-slider::before{transform:translateX(16px)}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:24px;color:var(--tone-2);cursor:pointer}
#settings-modal .modal,#stats-modal .modal{position:relative}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
//  WORDLE — Exact Replica
//  Design: NYT Wordle clone with exact colors, animations, logic
// ═══════════════════════════════════════════════════════════════

// ─── WORD LISTS ──────────────────────────────────────────────
// (defined at end of file: ANSWERS[], GUESSES[])
// Combined valid words set for quick lookup
let ANSWERS, GUESSES;
const VALID = new Set();

// ═══ GAME VERSION — force localStorage clear on update ═══════
const GAME_VERSION = 2; // Increment to force all players to start fresh

// ─── LAUNCH DATE ─────────────────────────────────────────────
// Wordle launched June 19, 2021 — resets at 12AM Philippine Time (UTC+8)
const PHT_OFFSET_MS = 8 * 60 * 60 * 1000; // UTC+8 offset in milliseconds
// Days from epoch to June 19, 2021 00:00 UTC (= midnight PHT on launch day)
const LAUNCH_EPOCH_DAYS = 18797; // Math.floor(Date.UTC(2021, 5, 19) / 86400000)

// ─── GAME STATE ──────────────────────────────────────────────
const state = {
  solution: '',
  gameDate: -1,       // Daily index when this game started (-1 = not started)
  guesses: [],        // Array of {word, result[]}
  currentGuess: [],   // Array of 5 chars (current row)
  gameStatus: 'playing', // playing | won | lost
  rowIndex: 0,
  tileIndex: 0,
  isAnimating: false,
  keyStates: {},      // letter → 'correct'|'present'|'absent'|''
  tileStates: [],     // [row][col] = 'empty'|'tbd'|'correct'|'present'|'absent'
  darkMode: false,
  highContrast: false,
  stats: { played:0, wins:0, streak:0, maxStreak:0, distribution:[0,0,0,0,0,0] },
};

// ─── DOM REFS ────────────────────────────────────────────────
const board = document.getElementById('board');
const toastContainer = document.getElementById('toast-container');
const rows = [0,1,2,3,4,5].map(() => document.createElement('div'));
const keyboardRows = [
  document.getElementById('kb-row-0'),
  document.getElementById('kb-row-1'),
  document.getElementById('kb-row-2'),
];

// ─── KEYBOARD LAYOUT ─────────────────────────────────────────
const KEYBOARD = [
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['enter','z','x','c','v','b','n','m','backspace'],
];

// ─── UTILITY ─────────────────────────────────────────────────
function getTodayIndex() {
  // Philippine Time (UTC+8) — resets at 12AM PHT
  // ⚡ Use floor(a/86400000) - floor(b/86400000) NOT floor((a-b)/86400000)
  // The latter shifts the boundary by 8h, causing word to change at 4PM instead of midnight!
  const phtNow = Date.now() + PHT_OFFSET_MS;
  let idx = Math.floor(phtNow / 86400000) - LAUNCH_EPOCH_DAYS;
  // TEMP: +1 para makita mo agad ang reset (magsi-shift to "spent") — i-revert ko pag nasabi mo na okay na
  idx += 1;
  return idx;
}
function pickDaily() {
  const idx = getTodayIndex() % ANSWERS.length;
  return ANSWERS[idx];
}

// ─── WORD EVALUATION ────────────────────────────────────────
function evaluateGuess(guess, solution) {
  const result = ['absent','absent','absent','absent','absent'];
  const guessArr = guess.split('');
  const solArr = solution.split('');
  const used = [false,false,false,false,false];

  // Pass 1: Mark correct (green)
  for (let i = 0; i < 5; i++) {
    if (guessArr[i] === solArr[i]) {
      result[i] = 'correct';
      used[i] = true;
    }
  }

  // Pass 2: Mark present (yellow) from remaining
  for (let i = 0; i < 5; i++) {
    if (result[i] === 'correct') continue;
    for (let j = 0; j < 5; j++) {
      if (!used[j] && guessArr[i] === solArr[j]) {
        result[i] = 'present';
        used[j] = true;
        break;
      }
    }
  }

  return result;
}

// ─── TOAST ───────────────────────────────────────────────────
let toastTimeout = null;
function showToast(msg, duration = 1500) {
  if (toastTimeout) clearTimeout(toastTimeout);
  const t = document.createElement('div');
  t.className = 'toast show';
  t.textContent = msg;
  toastContainer.innerHTML = '';
  toastContainer.appendChild(t);
  toastTimeout = setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 300);
  }, duration);
}

// ─── RENDER BOARD ────────────────────────────────────────────
function buildBoard() {
  board.innerHTML = '';
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.dataset.row = r;
    for (let c = 0; c < 5; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile empty';
      tile.dataset.row = r;
      tile.dataset.col = c;
      const inner = document.createElement('span');
      inner.className = 'tile-inner';
      tile.appendChild(inner);
      row.appendChild(tile);
    }
    board.appendChild(row);
  }
  // Init tile states
  state.tileStates = Array.from({length:6}, () => Array(5).fill('empty'));
}

function getTile(row, col) {
  return board.querySelector(`.row[data-row="${row}"] .tile[data-col="${col}"]`);
}
function getRowEl(row) {
  return board.querySelector(`.row[data-row="${row}"]`);
}

function renderBoard() {
  // Render all guesses
  for (let r = 0; r < state.guesses.length; r++) {
    const {word, result} = state.guesses[r];
    for (let c = 0; c < 5; c++) {
      const tile = getTile(r, c);
      tile.className = `tile ${result[c]}`;
      tile.querySelector('.tile-inner').textContent = word[c];
      state.tileStates[r][c] = result[c];
    }
  }

  // Render current guess
  const r = state.guesses.length;
  for (let c = 0; c < 5; c++) {
    const tile = getTile(r, c);
    const char = state.currentGuess[c] || '';
    if (char) {
      tile.className = 'tile tbd';
      tile.querySelector('.tile-inner').textContent = char;
      state.tileStates[r][c] = 'tbd';
    } else {
      tile.className = 'tile empty';
      tile.querySelector('.tile-inner').textContent = '';
      state.tileStates[r][c] = 'empty';
    }
  }

  // Clear future rows
  for (let r = state.guesses.length + 1; r < 6; r++) {
    const row = getRowEl(r);
    if (row) {
      for (let c = 0; c < 5; c++) {
        const tile = getTile(r, c);
        tile.className = 'tile empty';
        tile.querySelector('.tile-inner').textContent = '';
        state.tileStates[r][c] = 'empty';
      }
    }
  }
}

// ─── KEYBOARD RENDER ─────────────────────────────────────────
function buildKeyboard() {
  KEYBOARD.forEach((keys, ri) => {
    const row = keyboardRows[ri];
    row.innerHTML = '';
    keys.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'key';
      btn.dataset.key = key;
      if (key === 'enter' || key === 'backspace') btn.classList.add('wide');
      btn.textContent = key === 'backspace' ? '⌫' : key;
      btn.addEventListener('click', () => handleKey(key));
      // Touch feedback
      btn.addEventListener('touchstart', () => btn.style.opacity = '.5', {passive:true});
      btn.addEventListener('touchend', () => btn.style.opacity = '1', {passive:true});
      row.appendChild(btn);
    });
  });
}

function renderKeyboard() {
  document.querySelectorAll('.key').forEach(k => {
    const l = k.dataset.key;
    if (l === 'enter' || l === 'backspace') return;
    const s = state.keyStates[l] || '';
    k.className = 'key' + (s ? ' ' + s : '') + (l === 'enter' || l === 'backspace' ? ' wide' : '');
  });
}

// ─── ANIMATIONS ──────────────────────────────────────────────
function animatePop(row, col) {
  const tile = getTile(row, col);
  tile.classList.remove('tile-pop');
  // Force reflow
  void tile.offsetWidth;
  tile.classList.add('tile-pop');
}

function animateRowSubmit(row, result) {
  return new Promise(resolve => {
    const promises = [];
    for (let c = 0; c < 5; c++) {
      promises.push(new Promise(res => {
        const tile = getTile(row, c);
        const delay = c * 100 + 50; // stagger: 150ms per tile

        // Wait for delay, then flip
        setTimeout(() => {
          // First half: flip to 90deg (face hidden)
          tile.style.transition = 'transform .15s ease-in';
          tile.style.transform = 'rotateX(90deg)';

          setTimeout(() => {
            // Midpoint: change color + text
            tile.className = `tile ${result[c]}`;
            tile.style.transition = 'transform .15s ease-out';
            tile.style.transform = 'rotateX(0)';

            // Update key state
            const letter = state.guesses[row].word[c];
            updateKeyState(letter, result[c]);

            setTimeout(() => {
              tile.style.transition = '';
              tile.style.transform = '';
              res();
            }, 150);
          }, 150);
        }, delay);
      }));
    }
    Promise.all(promises).then(resolve);
  });
}

function animateRowShake(row) {
  return new Promise(resolve => {
    const rowEl = getRowEl(row);
    rowEl.classList.add('row-shake');
    setTimeout(() => {
      rowEl.classList.remove('row-shake');
      resolve();
    }, 600);
  });
}

function animateRowBounce(row) {
  const rowEl = getRowEl(row);
  rowEl.classList.add('row-bounce');
}

function updateKeyState(letter, newState) {
  const current = state.keyStates[letter] || '';
  // Priority: correct > present > absent
  const priority = { correct:3, present:2, absent:1, '':0 };
  if (priority[newState] > priority[current]) {
    state.keyStates[letter] = newState;
  }
  renderKeyboard();
}

// ─── CORE LOGIC ──────────────────────────────────────────────
function handleKey(key) {
  if (state.gameStatus !== 'playing' || state.isAnimating) return;

  if (key === 'enter') {
    submitGuess();
  } else if (key === 'backspace') {
    if (state.currentGuess.length > 0) {
      state.currentGuess.pop();
      state.tileIndex = state.currentGuess.length;
      renderBoard();
    }
  } else if (/^[a-z]$/.test(key)) {
    if (state.currentGuess.length < 5) {
      state.currentGuess.push(key);
      state.tileIndex = state.currentGuess.length;
      const row = state.guesses.length;
      const col = state.currentGuess.length - 1;
      renderBoard();
      animatePop(row, col);
    }
  }
}

async function submitGuess() {
  const guess = state.currentGuess.join('');
  if (guess.length !== 5) {
    showToast('Not enough letters');
    animateRowShake(state.guesses.length);
    return;
  }
  if (!VALID.has(guess)) {
    // Dictionary API fallback: check if it's a real English word
    showToast('Checking dictionary...');
    state.isAnimating = true;
    try {
      const resp = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${guess}`);
      if (!resp.ok) {
        state.isAnimating = false;
        showToast('Not in word list');
        animateRowShake(state.guesses.length);
        return;
      }
      // Valid word found! Add it to the valid set for future checks
      VALID.add(guess);
      state.isAnimating = false;
    } catch(e) {
      state.isAnimating = false;
      showToast('Not in word list');
      animateRowShake(state.guesses.length);
      return;
    }
  }

  state.isAnimating = true;

  // Evaluate
  const result = evaluateGuess(guess, state.solution);
  state.guesses.push({word: guess, result});

  // Animate row submit (flip each tile)
  const rowIndex = state.guesses.length - 1;
  animateRowSubmit(rowIndex, result).then(() => {
    state.currentGuess = [];
    state.tileIndex = 0;
    renderBoard();
    renderKeyboard();

    // Check win
    if (guess === state.solution) {
      state.gameStatus = 'won';
      animateRowBounce(rowIndex);
      // Update stats
      const guessNum = state.guesses.length;
      state.stats.played++;
      state.stats.wins++;
      state.stats.streak++;
      if (state.stats.streak > state.stats.maxStreak) state.stats.maxStreak = state.stats.streak;
      state.stats.distribution[guessNum - 1]++;
      saveStats();
      setTimeout(() => showStats(true), 1200);
    } else if (state.guesses.length >= 6) {
      // Lost
      state.gameStatus = 'lost';
      state.stats.played++;
      state.stats.streak = 0;
      saveStats();
      setTimeout(() => showStats(false), 500);
    }

    state.isAnimating = false;
    renderBoard();
  });
}

// ─── STATS ───────────────────────────────────────────────────
function saveStats() {
  try {
    localStorage.setItem('wordle-stats', JSON.stringify(state.stats));
  } catch(e) {/* ignore */}
}
function loadStats() {
  try {
    const d = localStorage.getItem('wordle-stats');
    if (d) state.stats = JSON.parse(d);
  } catch(e) {/* ignore */}
}

function showStats(won) {
  const modal = document.getElementById('stats-modal');
  const msg = document.getElementById('result-msg');
  const played = document.getElementById('stat-played');
  const winPct = document.getElementById('stat-win-pct');
  const streak = document.getElementById('stat-streak');
  const maxStreak = document.getElementById('stat-max-streak');
  const dist = document.getElementById('guess-distribution');
  const timer = document.getElementById('next-word-timer');

  if (won) {
    msg.textContent = 'Wonderful!';
  } else if (state.guesses.length >= 6) {
    msg.textContent = `The word was ${state.solution.toUpperCase()}`;
  }

  played.textContent = state.stats.played;
  winPct.textContent = state.stats.played > 0 ? Math.round(state.stats.wins / state.stats.played * 100) : 0;
  streak.textContent = state.stats.streak;
  maxStreak.textContent = state.stats.maxStreak;

  // Distribution bars
  dist.innerHTML = '';
  const maxVal = Math.max(...state.stats.distribution, 1);
  for (let i = 0; i < 6; i++) {
    const count = state.stats.distribution[i];
    const pct = count / maxVal * 100;
    const div = document.createElement('div');
    div.className = 'dist-bar';
    div.innerHTML = `
      <span class="dist-label">${i + 1}</span>
      <div class="dist-fill ${won && i === state.guesses.length - 1 ? 'highlight' : ''}" style="width:${Math.max(pct, 8)}%">
        ${count || ''}
      </div>
    `;
    dist.appendChild(div);
  }

  // Next word timer — midnight PHT (UTC+8) — LIVE countdown
  let countdownInterval;
  function updateTimer() {
    const phtDayProgress = ((Date.now() + PHT_OFFSET_MS) % 86400000);
    const secsUntilMidnight = Math.max(0, Math.floor((86400000 - phtDayProgress) / 1000));
    const secsLeft = secsUntilMidnight >= 86400 ? 0 : secsUntilMidnight;
    const hrs = Math.floor(secsLeft / 3600);
    const mins = Math.floor((secsLeft % 3600) / 60);
    const secs = secsLeft % 60;
    const label = `${hrs}h ${mins}m ${secs}s`;
    timer.textContent = secsLeft > 0 ? `Next word in ${label}` : 'New word available!';
  }
  updateTimer();
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(updateTimer, 1000);

  // Fetch definition — show for both won AND lost
  const defBox = document.getElementById('definition-box');
  if (state.gameStatus !== 'playing' && state.solution) {
    defBox.className = 'definition-box open';
    defBox.innerHTML = '<div class="def-loading">Loading definition...</div>';
    fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${state.solution}`)
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => {
        const entry = data[0];
        const phonetic = entry.phonetic || entry.phonetics?.[0]?.text || '';
        const meaning = entry.meanings?.[0];
        const def = meaning?.definitions?.[0]?.definition || '';
        const partOfSpeech = meaning?.partOfSpeech || '';
        defBox.innerHTML = `
          <div class="def-word">${state.solution.toUpperCase()}</div>
          ${phonetic ? `<div class="def-phonetic">${phonetic}</div>` : ''}
          ${def ? `<div class="def-meaning"><em>${partOfSpeech}</em> &mdash; ${def}</div>` : ''}
        `;
      })
      .catch(() => {
        defBox.innerHTML = '';
      });
  } else {
    defBox.className = 'definition-box hidden';
  }

  modal.classList.add('open');
}

// ─── SHARE ───────────────────────────────────────────────────
function shareResult() {
  let text = `Wordle ${getTodayIndex()} ${state.guesses.length}/6\n\n`;
  for (const {word, result} of state.guesses) {
    text += result.map(r => {
      if (r === 'correct') return '🟩';
      if (r === 'present') return '🟨';
      return '⬛';
    }).join('') + '\n';
  }
  text += `\nwordle-clone.pages.dev`;

  if (navigator.share) {
    navigator.share({ text }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
  } else {
    // Fallback: select text
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showToast('Copied!');
  }
}

// ─── SETTINGS ────────────────────────────────────────────────
function toggleDark(enable) {
  state.darkMode = enable;
  document.documentElement.classList.toggle('dark', enable);
  localStorage.setItem('wordle-dark', enable ? '1' : '0');
}
function toggleHC(enable) {
  state.highContrast = enable;
  document.documentElement.classList.toggle('high-contrast', enable);
  localStorage.setItem('wordle-hc', enable ? '1' : '0');
}

// ─── PHYSICAL KEYBOARD ──────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter') { handleKey('enter'); e.preventDefault(); }
  else if (e.key === 'Backspace') { handleKey('backspace'); e.preventDefault(); }
  else if (/^[a-zA-Z]$/.test(e.key)) { handleKey(e.key.toLowerCase()); }
});

// ─── INIT ────────────────────────────────────────────────────
function init() {
  // Build DOM
  buildBoard();
  buildKeyboard();

  // Load settings
  const savedDark = localStorage.getItem('wordle-dark') === '1';
  const savedHC = localStorage.getItem('wordle-hc') === '1';
  toggleDark(savedDark);
  toggleHC(savedHC);
  document.getElementById('toggle-dark').checked = savedDark;
  document.getElementById('toggle-hc').checked = savedHC;

  // Load stats
  loadStats();

  // Combine word lists
  for (const w of ANSWERS) VALID.add(w);
  for (const w of GUESSES) VALID.add(w);

  // ═══ VERSION CHECK — clear buggy localStorage from old versions ═══
  const savedVersion = localStorage.getItem('wordle-version');
  if (savedVersion !== String(GAME_VERSION)) {
    // Clear ALL old localStorage data — ensures clean state after update
    localStorage.removeItem('wordle-game');
    localStorage.removeItem('wordle-version');
    localStorage.setItem('wordle-version', String(GAME_VERSION));
  }

  // Check for existing game in localStorage (BEFORE setting new word)
  const savedGame = localStorage.getItem('wordle-game');
  let restored = false;
  if (savedGame) {
    try {
      const data = JSON.parse(savedGame);
      const today = getTodayIndex();
      // Only restore if same day (solution will be correct since gameDate = getTodayIndex)
      if (data.date === today) {
        state.solution = data.solution;
        state.gameDate = data.date;
        state.guesses = data.guesses || [];
        state.currentGuess = data.currentGuess || [];
        state.gameStatus = data.gameStatus || 'playing';
        state.keyStates = data.keyStates || {};
        // Rebuild keyboard states from guesses
        for (const g of state.guesses) {
          for (let c = 0; c < 5; c++) {
            updateKeyState(g.word[c], g.result[c]);
          }
        }
        restored = true;
      } else {
        // Stale save from previous day — remove it
        localStorage.removeItem('wordle-game');
      }
    } catch(e) {
      localStorage.removeItem('wordle-game');
    }
  }

  // If no valid saved game, start fresh with today's word
  if (!restored) {
    state.solution = pickDaily();
    state.gameDate = getTodayIndex();
    state.guesses = [];
    state.currentGuess = [];
    state.gameStatus = 'playing';
    state.keyStates = {};
    console.log('Wordle', state.gameDate, ':', state.solution); // Dev only
  }

  renderBoard();
  renderKeyboard();

  // Event listeners
  document.getElementById('menu-btn').addEventListener('click', () => showToast('Wordle — Daily Word Game'));
  document.getElementById('stats-btn').addEventListener('click', () => showStats(false));
  document.getElementById('stats-close').addEventListener('click', () => {
    document.getElementById('stats-modal').classList.remove('open');
    if (typeof countdownInterval !== 'undefined') clearInterval(countdownInterval);
  });
  document.getElementById('settings-btn').addEventListener('click', () => document.getElementById('settings-modal').classList.add('open'));
  document.getElementById('settings-close').addEventListener('click', () => document.getElementById('settings-modal').classList.remove('open'));
  document.getElementById('share-btn').addEventListener('click', shareResult);

  document.getElementById('toggle-dark').addEventListener('change', e => toggleDark(e.target.checked));
  document.getElementById('toggle-hc').addEventListener('change', e => toggleHC(e.target.checked));

  // Close modals on overlay click
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target === el) {
        el.classList.remove('open');
        if (typeof countdownInterval !== 'undefined') clearInterval(countdownInterval);
      }
    });
  });
}

// ─── SAVE GAME STATE ─────────────────────────────────────────
function saveGame() {

  const data = {
    date: state.gameDate, // ⚡ Use the game's start date, NOT current date
    solution: state.solution,
    guesses: state.guesses,
    currentGuess: state.currentGuess,
    gameStatus: state.gameStatus,
    keyStates: state.keyStates,
  };
  try {
    localStorage.setItem('wordle-game', JSON.stringify(data));
  } catch(e) {}
}

window.addEventListener('beforeunload', saveGame);

// ─── LIVE DAY ROLLOVER DETECTION ────────────────────────────
// Checks every second if the PHT day changed — auto-resets without refresh
let dayCheckInterval = setInterval(() => {
  if (state.gameDate < 0) return;
  const todayIdx = getTodayIndex();
  if (todayIdx !== state.gameDate) {
    // Day rollover! Reset the game with new word
    const newSolution = pickDaily();
    state.gameDate = todayIdx;
    state.solution = newSolution;
    state.guesses = [];
    state.currentGuess = [];
    state.gameStatus = 'playing';
    state.keyStates = {};
    state.tileStates = Array.from({length:6}, () => Array(5).fill('empty'));
    try { localStorage.removeItem('wordle-game'); } catch(e) {}

    renderKeyboard();
    showToast('New word available!', 2000);
  }
}, 1000);
