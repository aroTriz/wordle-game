  <rect x="16" y="4" width="5" height="5" rx="1" fill="#ffbd2e"/>
  <rect x="22" y="4" width="5" height="5" rx="1" fill="#ff5f56"/>
  <rect x="4" y="10" width="5" height="5" rx="1" fill="#ffbd2e"/>
  <rect x="10" y="10" width="5" height="5" rx="1" fill="#27c93f"/>
  <rect x="16" y="10" width="5" height="5" rx="1" fill="#2a2a2a"/>
  <rect x="22" y="10" width="5" height="5" rx="1" fill="#2a2a2a"/>
  <rect x="4" y="16" width="5" height="5" rx="1" fill="#ff5f56"/>
